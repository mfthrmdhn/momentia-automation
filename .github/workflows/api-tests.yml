name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [be-ci-trigger]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: mfthrmdhn/momentia-be
          ref: ${{github.event.client_payload.sha || github.event.client_payload.be_branch ||'main'}}
          path: momentia-be

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: momentia-be/go.mod

      - name: Start database
        run: docker compose up -d
        working-directory: momentia-be

      - name: Install migrate CLI
        run: |
            curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xvz
            sudo mv migrate /usr/local/bin/migrate

      - name: Run Migrations
        if: github.event.client_payload.migration_path != ''
        run: migrate -path internal/db/migrations -database "postgres://bapak_kau:your_father_head@localhost:5433/momentia?sslmode=disable" up
        working-directory: momentia-be

      - name: Seed database
        if: github.event.client_payload.seed_cmd != ''
        run: ${{github.event.client_payload.seed_cmd}}
        working-directory: momentia-be

      - name: Start Go server
        run: go run ./cmd/api &
        working-directory: momentia-be

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on port 8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Backend failed to start in time"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop backend services
        if: always()
        run: docker compose down
        working-directory: momentia-be
