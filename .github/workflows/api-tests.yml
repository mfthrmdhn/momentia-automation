name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [be-ci-trigger]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      JWT_SECRET: ${{secrets.JWT_SECRET}}

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: mfthrmdhn/momentia-be
          ref: ${{github.event.client_payload.sha || github.event.client_payload.be_branch ||'main'}}
          path: momentia-be

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: momentia-be/go.mod

      - name: Start database
        run: docker compose up -d
        working-directory: momentia-be

      - name: Wait for database to be ready
        run: |
          echo "Waiting for PostgreSQL on port 5433..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5433 -U bapak_kau > /dev/null 2>&1; then
              echo "Database is ready"
              exit 0
            fi
            echo "Attempt $i/30 - database not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Database failed to start in time"
          exit 1

      - name: Install migrate CLI
        run: |
            curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xvz
            sudo mv migrate /usr/local/bin/migrate

      - name: Run Migrations
        run: migrate -path internal/db/migrations -database "postgres://bapak_kau:your_father_head@localhost:5433/momentia?sslmode=disable" up
        working-directory: momentia-be

      - name: Seed database
        env:
          DB_HOST: localhost
          DB_PORT: "5433"
          DB_USER: bapak_kau
          DB_PASSWORD: your_father_head
          DB_NAME: momentia
          DB_SSLMODE: disable
        run: ${{github.event.client_payload.seed_cmd || 'go run ./cmd/seed'}}
        working-directory: momentia-be

      - name: Start Go server
        env:
          DB_HOST: localhost
          DB_PORT: "5433"
          DB_USER: bapak_kau
          DB_PASSWORD: your_father_head
          DB_NAME: momentia
          DB_SSLMODE: disable
        run: |
          nohup go run ./cmd/api > server.log 2>&1 &
          SERVER_PID=$!
          
          # Give the server time to start
          sleep 3

          # Check the backend readyness
          echo "Waiting for backend on port 8080..."
          for i in $(seq 1 5); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i/5 - not ready yet, retrying in 5s..."
            sleep 5
          done
          
          # Check if process is still running
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server failed to start. Logs:"
            cat server.log
            exit 1
          fi
          
          # Store PID for later cleanup
          echo $SERVER_PID > /tmp/server.pid
        working-directory: momentia-be

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

#      disable because this is only for API tests
#      - name: Install Playwright browsers
#        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npm run test:api

      - name: Prune old reports
        if: always()
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cd /tmp/gh-pages
          shopt -s nullglob
          cutoff=$(date -u -d '2 days ago' +%Y-%m-%d)
          for dir in reports/*/; do
            name=$(basename "$dir")
            date="${name:0:10}"
            if [[ "$date" < "$cutoff" ]]; then
              rm -rf "$dir"
            fi
          done
          git add -A
          if ! git diff --cached --quiet; then
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "chore: prune reports older than 2 days"
            git push origin HEAD:gh-pages
          fi

      - name: Set report path
        if: always()
        run: echo "REPORT_PATH=reports/$(date -u +%Y-%m-%d)-${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Deploy Playwright report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: ${{ env.REPORT_PATH }}
          keep_files: true

      - name: Output report URL
        if: always()
        run: |
          echo "### Playwright Report" >> "$GITHUB_STEP_SUMMARY"
          echo "[View report](https://mfthrmdhn.github.io/momentia-automation/${{ env.REPORT_PATH }}/)" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop backend services
        if: always()
        run: docker compose down
        working-directory: momentia-be
